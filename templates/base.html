<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Workshop Service{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* Global Dashboard Styling */
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8fafc; /* Matches your dashboard light background */
      color: #334155;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Navbar Modernization */
    .navbar {
      background-color: #ffffff;
      border-bottom: 1px solid #e2e8f0;
    }
    .navbar-brand {
      font-weight: 700;
      color: #0f172a !important;
      letter-spacing: -0.5px;
    }

    /* Button Styling */
    .btn-logout {
      border-radius: 8px; /* Softer corners */
      font-weight: 500;
    }

    /* Pushes footer to the bottom */
    main {
      flex: 1;
    }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body>

  <nav class="navbar navbar-expand-lg sticky-top shadow-sm mb-4 py-3">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="{% url 'dashboard' %}">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="#0d6efd" class="bi bi-layers-fill" viewBox="0 0 16 16">
          <path d="M7.765 1.559a.5.5.5 0 0 1 .47 0l7.5 4a.5.5.5 0 0 1 0 .882l-7.5 4a.5.5.5 0 0 1-.47 0l-7.5-4a.5.5.5 0 0 1 0-.882l7.5-4z"/>
          <path d="M2.125 8.567l-1.86.992a.5.5.5 0 0 0 0 .882l7.5 4a.5.5.5 0 0 0 .47 0l7.5-4a.5.5.5 0 0 0 0-.882l-1.86-.992-5.17 2.756a1.5 1.5 0 0 1-1.41 0l-5.17-2.756z"/>
        </svg>
        Workshop Service
      </a>

      <div class="d-flex align-items-center ms-auto gap-3">
        {% if user.is_authenticated %}
          <span class="text-muted small d-none d-sm-inline">
            Logged in as <strong class="text-dark">{{ user.username }}</strong>
          </span>
          <form method="post" action="{% url 'logout' %}" class="d-inline m-0">
            {% csrf_token %}
            <button type="submit" class="btn btn-sm btn-outline-danger btn-logout px-3">Logout</button>
          </form>
        {% else %}
          <a href="{% url 'login' %}" class="btn btn-primary btn-sm px-3" style="border-radius: 8px;">Login</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center text-muted mt-5 mb-3 py-3">
    <small>Workshop Service © {% now "Y" %}</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Minimal CSRF helper for fetch() POSTs
    window.getCookie = function(name) {
      const value = `; ${document.cookie}`;
      const parts = value.split(`; ${name}=`);
      if (parts.length === 2) return parts.pop().split(';').shift();
      return null;
    };
    window.getCSRFToken = function() {
      return window.getCookie('csrftoken');
    };
  </script>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
