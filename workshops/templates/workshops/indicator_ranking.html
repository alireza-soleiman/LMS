{% extends "base.html" %}
{% load static %}

{% block title %}Indicator Ranking — {{ project.title }}{% endblock %}

{% block content %}
<div class="container py-4">
<!-- ===== HEADER ===== -->
<div class="srf-header mb-4">

  <div class="srf-title">
    <div class="srf-step-badge">WS3</div>

    <div>
      <h2 class="mb-1">SRF Playing Card Ranking</h2>
      <p class="text-muted mb-0">
        Drag cards to rank indicators from <strong>Most Important</strong> to
        <strong>Least Important</strong>.
      </p>
    </div>
  </div>

</div>

<!-- ===== CONTROL BAR ===== -->
<div class="srf-toolbar shadow-sm">

  <!-- LEFT SIDE -->
  <div class="toolbar-left">

    <!-- Deck Button -->
    <button id="addWhiteCard" class="deck-button">
      <div class="deck-stack">
        <div></div><div></div><div></div>
      </div>
      <span>click to add white card </span>
    </button>

    <!-- Merge + Counter COMBINED -->
    <button id="mergeBtn" class="merge-button">
      🔗 Merge
      <span id="selectionCount" class="merge-count">0</span>
    </button>

  </div>

  <!-- RIGHT SIDE -->
  <div class="toolbar-right">

    <!-- Color Picker Professional -->
    <label class="color-control">
      <span>🎨 Card Color</span>
      <input type="color" id="colorPicker" value="#ffffff">
    </label>

      <a href="{% url 'indicator_selection' project.id %}"
   class="btn btn-outline-secondary btn-sm">
⬅ Back to Selection
</a>


      <button id="restartRankingBtn"
        class="btn btn-outline-warning btn-sm">
🔄 Start Again
</button>

    <!-- Save Button Primary -->
    <button id="saveRankingBtn" class="save-button">
      💾 Save Ranking
    </button>

  </div>

</div>

</div>

<!-- Board -->
<div id="board"></div>

</div>




<style>
    #board{
    min-height:650px;
    padding:60px;
    border-radius:20px;

    background:
    radial-gradient(circle at center,#1f6f43 0%,#155d38 70%,#0e3f26 100%);

    box-shadow:
    inset 0 0 40px rgba(0,0,0,0.6),
    0 10px 40px rgba(0,0,0,0.3);

    display:flex;
    flex-wrap:wrap;
    gap:28px;
    justify-content:center;
    align-items:flex-start;
    }

    /* REAL CARD */
    .srf-card{
    width:220px;
    height:300px;
    border-radius:16px;
    background:linear-gradient(#fff,#f8fafc);
    border:1px solid #e2e8f0;

    box-shadow:0 12px 25px rgba(0,0,0,.25);
    cursor:grab;
    position:relative;

    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:28px;
    font-weight:600;
    }

    .srf-card:hover{
    transform:translateY(-10px) rotate(var(--r,0deg)) scale(1.03);
    }

    .srf-card.selected{
    outline:3px solid #2563eb;
    }

    /* WHITE CARD */
    .white-card{
    border:2px dashed #cbd5e1;
    background:repeating-linear-gradient(45deg,#f8fafc,#f8fafc 12px,#e2e8f0 12px,#e2e8f0 24px);
    }

    /* GROUP */
    .group-card{
    display:flex;
    align-items:center;
    }

    /* Fan */
    .group-card .srf-card{
    margin-left:-90px;
    }
    .group-card .srf-card:first-child{
    margin-left:0;
    }

    /* Deck Button */
    .deck-button{
    background:none;
    border:none;
    cursor:pointer;
    }
    .deck-stack{
    position:relative;
    width:70px;
    height:100px;
    }
    .deck-stack div{
    position:absolute;
    width:70px;
    height:100px;
    background:white;
    border-radius:10px;
    box-shadow:0 6px 15px rgba(0,0,0,.3);
    }
    .deck-stack div:nth-child(1){transform:rotate(-6deg);}
    .deck-stack div:nth-child(2){transform:rotate(3deg);}
    .deck-stack div:nth-child(3){transform:rotate(0deg);}

    /* ===== HEADER ===== */
.srf-header{
display:flex;
align-items:center;
justify-content:space-between;
}

.srf-title{
display:flex;
gap:18px;
align-items:center;
}

.srf-step-badge{
width:52px;
height:52px;
border-radius:14px;
background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:white;
font-weight:700;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
box-shadow:0 8px 18px rgba(37,99,235,.35);
}

/* ===== TOOLBAR ===== */
.srf-toolbar{
background:white;
border-radius:16px;
padding:18px 22px;

display:flex;
align-items:center;
justify-content:space-between;
flex-wrap:wrap;
gap:20px;
}

.toolbar-left,
.toolbar-right{
display:flex;
align-items:center;
gap:16px;
flex-wrap:wrap;
}

/* ===== MERGE BUTTON WITH COUNTER ===== */
.merge-button{
border:none;
background:#eef2ff;
color:#3730a3;
padding:10px 18px;
border-radius:12px;
font-weight:600;
display:flex;
align-items:center;
gap:10px;
transition:.2s;
}

.merge-button:hover{
background:#e0e7ff;
transform:translateY(-2px);
}

.merge-count{
background:#4338ca;
color:white;
padding:3px 9px;
border-radius:999px;
font-size:13px;
font-weight:700;
}

/* ===== COLOR PICKER ===== */
.color-control{
display:flex;
flex-direction:column;
font-size:12px;
font-weight:600;
color:#475569;
gap:6px;
}

.color-control input{
width:48px;
height:38px;
border:none;
border-radius:8px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,.15);
}

/* ===== SAVE BUTTON ===== */
.save-button{
background:linear-gradient(135deg,#16a34a,#15803d);
color:white;
border:none;
padding:12px 22px;
border-radius:14px;
font-weight:700;
font-size:15px;

box-shadow:
0 10px 22px rgba(22,163,74,.35),
inset 0 1px 0 rgba(255,255,255,.25);

transition:.25s;
}

.save-button:hover{
transform:translateY(-3px);
box-shadow:
0 14px 28px rgba(22,163,74,.45);
}

.save-button:active{
transform:translateY(0);
}

</style>


<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded",()=>{

const board=document.getElementById("board");
const colorPicker=document.getElementById("colorPicker");
const selectionBadge=document.getElementById("selectionCount");

let selectedCards=new Set();

/* RANDOM ROTATION */
function randomRot(card){
const deg=(Math.random()*4-2).toFixed(2);
card.style.setProperty('--r',deg+"deg");
card.style.transform=`rotate(${deg}deg)`;
}

/* CREATE INDICATORS */
{% for ind in indicators %}
createIndicatorCard("{{ind.id}}","{{ind.name|escapejs}}");
{% endfor %}

function createIndicatorCard(id,name){
const card=document.createElement("div");
card.className="srf-card";
card.dataset.id=id;
card.dataset.type="indicator";
card.innerText=name;

randomRot(card);

card.onclick=()=>toggleSelect(card);
board.appendChild(card);
}

/* WHITE CARD */
document.getElementById("addWhiteCard").onclick=()=>{
const card=document.createElement("div");
card.className="srf-card white-card";
card.dataset.type="gap";
card.innerText="White Card";
board.appendChild(card);
}

/* SELECT */
function toggleSelect(card){
card.classList.toggle("selected");
card.classList.contains("selected")?
selectedCards.add(card):selectedCards.delete(card);
selectionBadge.innerText=selectedCards.size+" selected";
}

/* MERGE */
document.getElementById("mergeBtn").onclick=()=>{
if(selectedCards.size<2)return alert("Select 2+ cards");

const group=document.createElement("div");
group.className="group-card";
group.dataset.type="group";

selectedCards.forEach(c=>{
c.classList.remove("selected");
group.appendChild(c);
});

board.appendChild(group);
fan(group);

selectedCards.clear();
selectionBadge.innerText="0 selected";
}

function fan(group){
const cards=[...group.children];
cards.forEach((c,i)=>{
const spread=(i-(cards.length-1)/2)*6;
c.style.transform=`rotate(${spread}deg)`;
});
}

/* DEAL ANIMATION */
setTimeout(()=>{
document.querySelectorAll(".srf-card").forEach((c,i)=>{
c.style.opacity=0;
c.style.transform="translateY(-200px)";
setTimeout(()=>{
c.style.transition="all .4s ease";
c.style.opacity=1;
randomRot(c);
},i*120);
});
},200);

/* SORT */
new Sortable(board,{
animation:200,
ghostClass:'dragging'
});

/* SAVE */
/* SAVE */
document.getElementById("saveRankingBtn").onclick=()=>{
    const order=[];
    const groups=[];

    [...board.children].forEach(el=>{
        // 1. Check for White Cards (Gaps)
        if(el.dataset.type==="gap") {
            order.push("gap");
        }
        // 2. Check for Merged Groups (Added class fallback for safety with SortableJS)
        else if(el.classList.contains("group-card") || el.dataset.type==="group"){
            const g=[...el.querySelectorAll(".srf-card")].map(x=>x.dataset.id);
            if (g.length > 0) {
                groups.push(g);
                order.push(g); // <--- CRITICAL FIX: Pushing the array natively, no spread operator!
            }
        }
        // 3. Single Cards
        else if(el.dataset.id) {
            order.push(el.dataset.id);
        }
    });

    fetch("{% url 'save_indicator_ranking' project.id %}",{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "X-CSRFToken":"{{ csrf_token }}"
        },
        body:JSON.stringify({order,groups})
    })
    .then(r=>r.json())
    .then(data=>{
        if(data.status === "success"){
            window.location.href = "{% url 'simos_manual' project.id %}";
        }else{
            alert("Save failed");
        }
    });
};

});   // close DOMContentLoaded

</script>

{% endblock %}
